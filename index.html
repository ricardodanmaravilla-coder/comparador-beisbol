<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Sabermétrico Pro + Brazo [L/R]</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; padding: 20px; display: flex; justify-content: center; }
        .app-container { max-width: 480px; width: 100%; background-color: #1e1e1e; padding: 20px; border-radius: 15px; }
        .seccion-scanner { background: #252525; border: 1px solid #FFD700; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .scanner-titulo { color: #FFD700; font-size: 13px; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .label-filtro { font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .selector-zona { display: flex; gap: 10px; margin-bottom: 15px; }
        select, .input-pitcher { width: 100%; padding: 10px; border-radius: 8px; background-color: #2a2a2a; color: white; border: 1px solid #444; }
        .input-pitcher { color: #FFD700; font-weight: bold; text-align: center; border: 1px solid #555; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .resultado { background: #252525; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; border: 1px solid #4CAF50; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>⚾ Scanner Sabermétrico</h1>

    <div class="seccion-scanner">
        <h3 class="scanner-titulo">🔥 Pick de la Jornada + Ajuste de Brazo</h3>
        <div id="scannerContenido" style="font-size:14px; text-align:center;">Analizando abridores...</div>
    </div>

    <span class="label-filtro">Equipos</span>
    <div class="selector-zona">
        <select id="equipo1"></select>
        <select id="equipo2"></select>
    </div>

    <span class="label-filtro">Lanzador Abridor [Brazo]</span>
    <div class="selector-zona">
        <input type="text" id="p1" class="input-pitcher" readonly>
        <input type="text" id="p2" class="input-pitcher" readonly>
    </div>

    <button onclick="simular()">Calcular Probabilidad Ajustada</button>

    <div id="panelResultados" class="resultado" style="display:none;">
        <div id="txtGanador" style="font-size:18px; font-weight:bold; color:#4CAF50;"></div>
        <div id="txtCarreras" style="font-size:16px; margin-top:10px;"></div>
    </div>
</div>

<script>
    // Base de datos de equipos con tendencia de bateo (L vs R)
    const equiposDB = {
        "147": { name: "Yankees", bateo: 0.252, tendencia: "R", era: 3.74 },
        "119": { name: "Dodgers", bateo: 0.265, tendencia: "L", era: 3.78 }
    };

    let datosJuego = null;

    async function escanearJornada() {
        try {
            const res = await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1');
            const data = await res.json();
            const juego = data.dates[0].games[0];
            
            datosJuego = juego; // Guardamos contexto

            const hora = new Date(juego.gameDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const p1 = juego.teams.away.probablePitcher;
            const p2 = juego.teams.home.probablePitcher;

            const nP1 = p1 ? `${p1.fullName} [${p1.pitchHand.code}]` : "Bullpen [?]";
            const nP2 = p2 ? `${p2.fullName} [${p2.pitchHand.code}]` : "Bullpen [?]";

            document.getElementById("p1").value = nP1;
            document.getElementById("p2").value = nP2;

            document.getElementById("scannerContenido").innerHTML = `
                ${juego.teams.away.team.name} vs ${juego.teams.home.team.name}<br>
                <b style="color:#FFD700">🕒 Hora Local: ${hora}</b>
            `;
        } catch (e) {
            document.getElementById("scannerContenido").innerText = "Error cargando API.";
        }
    }

    function simular() {
        const p1Brazo = document.getElementById("p1").value.includes("[L]") ? "L" : "R";
        const p2Brazo = document.getElementById("p2").value.includes("[L]") ? "L" : "R";
        
        // --- ALGORITMO CON AJUSTE DE PLATOON ---
        // Si el brazo del pitcher coincide con la tendencia del bateador, hay penalización
        let ajusteP1 = (p1Brazo === equiposDB["119"].tendencia) ? 0.95 : 1.05; 
        
        document.getElementById("panelResultados").style.display = "block";
        document.getElementById("txtGanador").innerText = "🏆 Ganador: " + (ajusteP1 > 1 ? "Dodgers" : "Yankees");
        document.getElementById("txtCarreras").innerText = "Total estimado ajustado por brazo: " + (ajusteP1 > 1 ? "8.5" : "7.2") + " Carreras";
    }

    window.onload = escanearJornada;
</script>
</body>
</html>
