<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Scanner Sabermétrico Total</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .app-container { max-width: 480px; width: 100%; background: #1e1e1e; padding: 20px; border-radius: 15px; }
        .box { background: #252525; border: 1px solid #444; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: center; }
        select, input { width: 100%; padding: 12px; margin: 5px 0; background: #333; color: white; border: 1px solid #555; border-radius: 5px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: #4CAF50; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
<div class="app-container">
    <h1>⚾ Scanner Sabermétrico</h1>
    
    <div class="box">
        <div id="scannerContenido">Escaneando jornada hoy...</div>
    </div>

    <select id="eq1" onchange="actualizarInterfaz()"></select>
    <select id="eq2" onchange="actualizarInterfaz()"></select>
    
    <div style="display:flex; gap:10px;">
        <input type="text" id="p1" readonly>
        <input type="text" id="p2" readonly>
    </div>

    <button onclick="simular()">Calcular Probabilidad Ajustada</button>

    <div id="panelResultados" class="box" style="display:none;">
        <div id="txtGanador" style="color:#4CAF50; font-weight:bold; font-size:18px;"></div>
        <div id="txtCarreras" style="margin-top:10px;"></div>
    </div>
</div>

<script>
    const datosMlb = {
        "147": { name: "Yankees", brazo: "R", bateo: 0.252, ops: 0.768, era: 3.74 },
        "119": { name: "Dodgers", brazo: "L", bateo: 0.265, ops: 0.795, era: 3.78 }
    };

    window.onload = async () => {
        const s1 = document.getElementById('eq1');
        const s2 = document.getElementById('eq2');
        Object.keys(datosMlb).forEach(id => {
            s1.innerHTML += `<option value="${id}">${datosMlb[id].name}</option>`;
            s2.innerHTML += `<option value="${id}">${datosMlb[id].name}</option>`;
        });
        
        // Cargar calendario real
        try {
            const res = await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1');
            const data = await res.json();
            const juego = data.dates[0].games[0];
            const p1 = juego.teams.away.probablePitcher;
            const p2 = juego.teams.home.probablePitcher;
            document.getElementById('scannerContenido').innerHTML = `<b>${juego.teams.away.team.name} vs ${juego.teams.home.team.name}</b><br>Abridores: ${p1?.fullName||'TBD'} [${p1?.pitchHand.code||'?'}] vs ${p2?.fullName||'TBD'} [${p2?.pitchHand.code||'?'}]`;
            document.getElementById('p1').value = `Brazo: [${p1?.pitchHand.code || '?'}]`;
            document.getElementById('p2').value = `Brazo: [${p2?.pitchHand.code || '?'}]`;
        } catch(e) { document.getElementById('scannerContenido').innerText = "Modo Local: Esperando selección manual."; }
    };

    function actualizarInterfaz() {
        const e1 = datosMlb[document.getElementById('eq1').value];
        const e2 = datosMlb[document.getElementById('eq2').value];
        document.getElementById('p1').value = `Brazo: [${e1.brazo}]`;
        document.getElementById('p2').value = `Brazo: [${e2.brazo}]`;
    }

    function simular() {
        const e1 = datosMlb[document.getElementById('eq1').value];
        const e2 = datosMlb[document.getElementById('eq2').value];
        
        // Lógica de Platoon: Si el equipo 1 enfrenta a un pitcher zurdo (L), hay un ajuste de 5%
        let factor = (e1.brazo === "L") ? 1.05 : 1.0;
        
        document.getElementById('panelResultados').style.display = "block";
        document.getElementById('txtGanador').innerText = "🏆 Ganador: " + (e1.bateo > e2.bateo ? e1.name : e2.name);
        document.getElementById('txtCarreras').innerText = "Carreras estimadas: " + (7.0 * factor).toFixed(1);
    }
</script>
</body>
</html>
