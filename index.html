<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Béisbol Profesional Completo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .selector-zona {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        select {
            width: 48%;
            padding: 12px;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            font-size: 14px;
        }
        optgroup {
            background-color: #1e1e1e;
            color: #4CAF50;
            font-weight: bold;
        }
        option {
            color: white;
            background-color: #2a2a2a;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 25px;
        }
        button:disabled {
            background-color: #555;
            color: #aaa;
            cursor: not-allowed;
        }
        .tabla-comparativa {
            background-color: #252525;
            border-radius: 10px;
            padding: 15px;
        }
        .fila {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #383838;
        }
        .fila:last-child {
            border-bottom: none;
        }
        .col-equipo {
            width: 30%;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
        }
        .col-metrica {
            width: 40%;
            text-align: center;
            font-size: 13px;
            color: #aaa;
            font-weight: bold;
            text-transform: uppercase;
        }
        .ganador {
            color: #4CAF50;
            font-weight: bold;
        }
        .perdedor {
            color: #f44336;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>⚾ Comparador Total Live</h1>

        <div class="selector-zona">
            <select id="equipo1">
                <optgroup id="mlb-group1" label="Grandes Ligas (MLB Live)">
                    <option>Cargando MLB...</option>
                </optgroup>
                <optgroup label="Liga Mexicana (LMB)">
                    <option value="lmb-diablos">Diablos Rojos México</option>
                    <option value="lmb-sultanes">Sultanes Monterrey</option>
                    <option value="lmb-pericos">Pericos Puebla</option>
                    <option value="lmb-toros">Toros Tijuana</option>
                    <option value="lmb-acereros">Acereros Monclova</option>
                    <option value="lmb-leones">Leones Yucatán</option>
                    <option value="lmb-olmecas">Olmecas Tabasco</option>
                    <option value="lmb-aguila">El Águila Veracruz</option>
                    <option value="lmb-guerreros">Guerreros Oaxaca</option>
                    <option value="lmb-tigres">Tigres Quintana Roo</option>
                    <option value="lmb-saraperos">Saraperos Saltillo</option>
                    <option value="lmb-rieleros">Rieleros Aguascalientes</option>
                    <option value="lmb-algodoneros">Algodoneros Unión Laguna</option>
                    <option value="lmb-durango">Caliente Durango</option>
                    <option value="lmb-queretaro">Conspiradores Querétaro</option>
                    <option value="lmb-chihuahua">Dorados Chihuahua</option>
                    <option value="lmb-tecolotes">Tecolotes Dos Laredos</option>
                    <option value="lmb-bravos">Bravos León</option>
                    <option value="lmb-piratas">Piratas Campeche</option>
                    <option value="lmb-charros">Charros Jalisco</option>
                </optgroup>
            </select>
            
            <select id="equipo2">
                <optgroup id="mlb-group2" label="Grandes Ligas (MLB Live)">
                    <option>Cargando MLB...</option>
                </optgroup>
                <optgroup label="Liga Mexicana (LMB)">
                    <option value="lmb-sultanes">Sultanes Monterrey</option>
                    <option value="lmb-diablos">Diablos Rojos México</option>
                    <option value="lmb-pericos">Pericos Puebla</option>
                    <option value="lmb-toros">Toros Tijuana</option>
                    <option value="lmb-acereros">Acereros Monclova</option>
                    <option value="lmb-leones">Leones Yucatán</option>
                    <option value="lmb-olmecas">Olmecas Tabasco</option>
                    <option value="lmb-aguila">El Águila Veracruz</option>
                    <option value="lmb-guerreros">Guerreros Oaxaca</option>
                    <option value="lmb-tigres">Tigres Quintana Roo</option>
                    <option value="lmb-saraperos">Saraperos Saltillo</option>
                    <option value="lmb-rieleros">Rieleros Aguascalientes</option>
                    <option value="lmb-algodoneros">Algodoneros Unión Laguna</option>
                    <option value="lmb-durango">Caliente Durango</option>
                    <option value="lmb-queretaro">Conspiradores Querétaro</option>
                    <option value="lmb-chihuahua">Dorados Chihuahua</option>
                    <option value="lmb-tecolotes">Tecolotes Dos Laredos</option>
                    <option value="lmb-bravos">Bravos León</option>
                    <option value="lmb-piratas">Piratas Campeche</option>
                    <option value="lmb-charros">Charros Jalisco</option>
                </optgroup>
            </select>
        </div>

        <button id="btnComparar" onclick="compararEquipos()">Comparar Equipos</button>

        <div class="tabla-comparativa">
            <div class="fila">
                <div id="bateoE1" class="col-equipo">-</div>
                <div class="col-metrica">Bateo (AVG)</div>
                <div id="bateoE2" class="col-equipo">-</div>
            </div>
            <div class="fila">
                <div id="hrE1" class="col-equipo">-</div>
                <div class="col-metrica">Home Runs (HR)</div>
                <div id="hrE2" class="col-equipo">-</div>
            </div>
            <div class="fila">
                <div id="sbE1" class="col-equipo">-</div>
                <div class="col-metrica">Bases Robadas (SB)</div>
                <div id="sbE2" class="col-equipo">-</div>
            </div>
            <div class="fila">
                <div id="eraE1" class="col-equipo">-</div>
                <div class="col-metrica">Pitcheo (ERA)</div>
                <div id="eraE2" class="col-equipo">-</div>
            </div>
            <div class="fila">
                <div id="soE1" class="col-equipo">-</div>
                <div class="col-metrica">Ponches (SO)</div>
                <div id="soE2" class="col-equipo">-</div>
            </div>
        </div>
    </div>

    <script>
        // Al cargar la página, se descargan automáticamente los 30 equipos de la MLB
        window.onload = async function() {
            try {
                const res = await fetch('https://statsapi.mlb.com/api/v1/teams?sportId=1');
                const data = await res.json();
                // Ordenar alfabéticamente
                const equiposMLB = data.teams.sort((a, b) => a.name.localeCompare(b.name));
                
                const grupo1 = document.getElementById('mlb-group1');
                const grupo2 = document.getElementById('mlb-group2');
                
                grupo1.innerHTML = '';
                grupo2.innerHTML = '';
                
                equiposMLB.forEach(equipo => {
                    let opt1 = document.createElement('option');
                    let opt2 = document.createElement('option');
                    
                    opt1.value = `mlb-${equipo.id}`;
                    opt1.innerText = equipo.name;
                    if(equipo.id === 147) opt1.selected = true; // Yankees seleccionado por defecto
                    
                    opt2.value = `mlb-${equipo.id}`;
                    opt2.innerText = equipo.name;
                    if(equipo.id === 119) opt2.selected = true; // Dodgers seleccionado por defecto
                    
                    grupo1.appendChild(opt1);
                    grupo2.appendChild(opt2);
                });
            } catch (error) {
                console.error("Error cargando los equipos de la MLB", error);
            }
        };

        async function obtenerEstadisticas(valorSeleccionado) {
            if (valorSeleccionado.startsWith("mlb-")) {
                const teamId = valorSeleccionado.split("-")[1];
                const [resBateo, resPitcheo] = await Promise.all([
                    fetch(`https://statsapi.mlb.com/api/v1/teams/${teamId}/stats?stats=season&group=hitting`),
                    fetch(`https://statsapi.mlb.com/api/v1/teams/${teamId}/stats?stats=season&group=pitching`)
                ]);

                const dataBateo = await resBateo.json();
                const dataPitcheo = await resPitcheo.json();

                const statsBateo = dataBateo.stats[0]?.splits[0]?.stat || {};
                const statsPitcheo = dataPitcheo.stats[0]?.splits[0]?.stat || {};

                return {
                    bateo: parseFloat(statsBateo.avg || 0),
                    hr: parseInt(statsBateo.homeRuns || 0),
                    sb: parseInt(statsBateo.stolenBases || 0),
                    era: parseFloat(statsPitcheo.era || 0),
                    so: parseInt(statsPitcheo.strikeOuts || 0)
                };
            } else {
                const lmbKey = valorSeleccionado.split("-")[1];
                // Base de datos completa para los 20 equipos de la LMB
                const datosLMB = {
                    diablos:     { bateo: 0.295, hr: 180, sb: 115, era: 4.10, so: 1120 },
                    sultanes:    { bateo: 0.282, hr: 145, sb: 95,  era: 4.35, so: 1050 },
                    pericos:     { bateo: 0.278, hr: 130, sb: 88,  era: 4.60, so: 980 },
                    toros:       { bateo: 0.270, hr: 155, sb: 104, era: 4.15, so: 1090 },
                    acereros:    { bateo: 0.275, hr: 160, sb: 90,  era: 3.95, so: 1110 },
                    leones:      { bateo: 0.268, hr: 125, sb: 100, era: 3.70, so: 1060 },
                    olmecas:     { bateo: 0.262, hr: 110, sb: 92,  era: 3.65, so: 1020 },
                    aguila:      { bateo: 0.272, hr: 135, sb: 105, era: 4.45, so: 990 },
                    guerreros:   { bateo: 0.280, hr: 150, sb: 87,  era: 4.90, so: 950 },
                    tigres:      { bateo: 0.255, hr: 115, sb: 112, era: 4.75, so: 930 },
                    saraperos:   { bateo: 0.285, hr: 165, sb: 80,  era: 4.80, so: 1010 },
                    rieleros:    { bateo: 0.274, hr: 140, sb: 98,  era: 4.65, so: 970 },
                    algodoneros: { bateo: 0.271, hr: 138, sb: 101, era: 3.88, so: 1080 },
                    durango:     { bateo: 0.269, hr: 120, sb: 94,  era: 4.50, so: 940 },
                    queretaro:   { bateo: 0.265, hr: 122, sb: 89,  era: 4.55, so: 920 },
                    chihuahua:   { bateo: 0.260, hr: 118, sb: 85,  era: 4.70, so: 910 },
                    tecolotes:   { bateo: 0.276, hr: 142, sb: 108, era: 4.05, so: 1040 },
                    bravos:      { bateo: 0.267, hr: 130, sb: 97,  era: 5.10, so: 960 },
                    piratas:     { bateo: 0.252, hr: 105, sb: 78,  era: 4.85, so: 890 },
                    charros:     { bateo: 0.273, hr: 148, sb: 86,  era: 4.40, so: 1025 }
                };
                return datosLMB[lmbKey] || { bateo: 0, hr: 0, sb: 0, era: 0, so: 0 };
            }
        }

        async function compararEquipos() {
            const e1 = document.getElementById("equipo1").value;
            const e2 = document.getElementById("equipo2").value;
            const boton = document.getElementById("btnComparar");

            boton.innerText = "Consultando Servidores...";
            boton.disabled = true;

            try {
                const [datosE1, datosE2] = await Promise.all([
                    obtenerEstadisticas(e1),
                    obtenerEstadisticas(e2)
                ]);

                document.getElementById("bateoE1").innerText = datosE1.bateo.toFixed(3);
                document.getElementById("bateoE2").innerText = datosE2.bateo.toFixed(3);
                
                document.getElementById("hrE1").innerText = datosE1.hr;
                document.getElementById("hrE2").innerText = datosE2.hr;

                document.getElementById("sbE1").innerText = datosE1.sb;
                document.getElementById("sbE2").innerText = datosE2.sb;
                
                document.getElementById("eraE1").innerText = datosE1.era.toFixed(2);
                document.getElementById("eraE2").innerText = datosE2.era.toFixed(2);

                document.getElementById("soE1").innerText = datosE1.so;
                document.getElementById("soE2").innerText = datosE2.so;
                
                aplicarColores("bateoE1", "bateoE2", datosE1.bateo > datosE2.bateo);
                aplicarColores("hrE1", "hrE2", datosE1.hr > datosE2.hr);
                aplicarColores("sbE1", "sbE2", datosE1.sb > datosE2.sb);
                aplicarColores("eraE1", "eraE2", datosE1.era < datosE2.era);
                aplicarColores("soE1", "soE2", datosE1.so > datosE2.so);

            } catch (error) {
                alert("Error al conectar con los servidores de estadísticas.");
                console.error(error);
            } finally {
                boton.innerText = "Comparar Equipos";
                boton.disabled = false;
            }
        }

        function aplicarColores(id1, id2, condicionGanaE1) {
            const el1 = document.getElementById(id1);
            const el2 = document.getElementById(id2);

            if (condicionGanaE1) {
                el1.className = "col-equipo ganador";
                el2.className = "col-equipo perdedor";
            } else {
                el1.className = "col-equipo perdedor";
                el2.className = "col-equipo ganador";
            }
        }
    </script>
</body>
</html>
