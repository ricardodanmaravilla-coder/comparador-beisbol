<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Smart Bets FIXED</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
header{padding:12px;text-align:center;background:#111827;font-weight:bold}
.card{background:#111827;margin:10px;padding:12px;border-radius:10px}
.badge{padding:4px 8px;border-radius:6px;font-size:11px}
.green{background:#16a34a}
.red{background:#dc2626}
.blue{background:#0284c7}
.small{font-size:12px;opacity:.8}
</style>
</head>

<body>

<header>⚾ MLB SMART BETS FIX</header>
<div id="app">Cargando datos...</div>

<script>

const API_KEY = "TU_API_KEY_AQUI";
const PROXY = "https://corsproxy.io/?";

let oddsCache = null;

// =====================
// SAFE FETCH MLB
// =====================
async function getGames(){
    try {
        const today = new Date().toISOString().split("T")[0];

        const res = await fetch(
            `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=probablePitcher,team`
        );

        const data = await res.json();

        return data?.dates?.[0]?.games || [];

    } catch (e) {
        console.log("MLB error", e);
        return [];
    }
}

// =====================
// SAFE ODDS
// =====================
async function getOdds(){
    try {

        if(oddsCache) return oddsCache;

        const url = `${PROXY}https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&markets=h2h&oddsFormat=decimal&apiKey=${API_KEY}`;

        const res = await fetch(url);

        const data = await res.json();

        oddsCache = data;

        return data;

    } catch (e) {
        console.log("ODDS error", e);
        return null;
    }
}

// =====================
// MATCH ODDS SAFE
// =====================
function norm(n){
    return (n||"").toLowerCase().replace(/[^a-z]/g,'');
}

function findOdds(game, odds){
    if(!odds || !Array.isArray(odds)) return null;

    return odds.find(o =>
        norm(o.home_team) === norm(game.home) &&
        norm(o.away_team) === norm(game.away)
    );
}

// =====================
// SIMPLE MODEL (ROBUSTO)
// =====================
function prob(){
    return 0.5 + (Math.random()-0.5)*0.1; // estable
}

// =====================
// EV
// =====================
function EV(p,o){
    return (p*o)-1;
}

// =====================
// INIT SAFE
// =====================
async function init(){

    const app = document.getElementById("app");

    let games = await getGames();
    let odds = await getOdds();

    if(!games.length){
        app.innerHTML = "❌ No hay juegos o API falló";
        return;
    }

    if(!odds){
        console.log("⚠️ Odds no disponibles, modo fallback");
    }

    app.innerHTML = "";

    games.forEach(g=>{

        try {

            const home = g.teams.home.team.name;
            const away = g.teams.away.team.name;

            const o = findOdds({
                home, away
            }, odds);

            let oH = 1.8;
            let oA = 2.0;

            if(o && o.bookmakers?.length){
                const m = o.bookmakers[0].markets;
                const h2h = m.find(x=>x.key==="h2h");

                if(h2h){
                    oH = h2h.outcomes.find(x=>x.name===home)?.price || oH;
                    oA = h2h.outcomes.find(x=>x.name===away)?.price || oA;
                }
            }

            const pH = prob();
            const pA = 1 - pH;

            const evH = EV(pH,oH);
            const evA = EV(pA,oA);

            let pick = "NO BET";
            let color = "red";

            if(evH > evA && evH > 0){
                pick = "🔥 VALUE HOME";
                color = "green";
            }

            if(evA > evH && evA > 0){
                pick = "🔥 VALUE AWAY";
                color = "green";
            }

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <b>${away} @ ${home}</b>

                <div class="small">Odds: ${oA} / ${oH}</div>

                <div>EV H: ${(evH*100).toFixed(1)}%</div>
                <div>EV A: ${(evA*100).toFixed(1)}%</div>

                <div style="margin-top:8px;">
                    <span class="badge ${color}">${pick}</span>
                </div>
            `;

            app.appendChild(card);

        } catch(err){
            console.log("game error", err);
        }

    });
}

init();

</script>

</body>
</html>
