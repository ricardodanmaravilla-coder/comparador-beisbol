<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador Sabermétrico Profesional (MLB & LMB)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .selector-zona {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        select {
            width: 48%;
            padding: 12px;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            font-size: 14px;
        }
        optgroup {
            background-color: #1e1e1e;
            color: #4CAF50;
            font-weight: bold;
        }
        option {
            color: white;
            background-color: #2a2a2a;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 25px;
        }
        button:disabled {
            background-color: #555;
            color: #aaa;
            cursor: not-allowed;
        }
        .tabla-comparativa {
            background-color: #252525;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .fila {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #383838;
        }
        .fila:last-child {
            border-bottom: none;
        }
        .col-equipo {
            width: 30%;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
        }
        .col-metrica {
            width: 40%;
            text-align: center;
            font-size: 13px;
            color: #aaa;
            font-weight: bold;
            text-transform: uppercase;
        }
        .ganador {
            color: #4CAF50;
            font-weight: bold;
        }
        .perdedor {
            color: #f44336;
        }
        .tarjeta-prediccion {
            background-color: #252525;
            border: 2px dashed #4CAF50;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            display: none;
        }
        .tarjeta-prediccion h2 {
            color: #4CAF50;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .resultado-prediccion {
            font-size: 15px;
            margin: 10px 0;
            color: #ddd;
        }
        .destaque-ganador {
            color: #4CAF50;
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin-top: 4px;
        }
        .destaque-carreras {
            color: #FFD700;
            font-weight: bold;
            font-size: 22px;
            display: block;
            margin-top: 4px;
        }
    </style>
</head>
