async function getGames() {
    const today = new Date().toISOString().split("T")[0];

    const res = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}`);
    const data = await res.json();

    if (!data.dates.length) return [];

    return data.dates[0].games;
}

// =========================
// 💰 FETCH ODDS
// =========================

async function getRealOdds() {
    try {
        const url = `${PROXY}https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&markets=h2h,totals&oddsFormat=decimal&apiKey=${API_KEY}`;
        const res = await fetch(url);
        return await res.json();
    } catch(e){
        console.log("Error odds", e);
        return null;
    }
}

// =========================
// 🧠 CACHE INTELIGENTE
// =========================

function getCacheTime() {
    const hour = new Date().getHours();

    if (hour < 12) return 30 * 60 * 1000;
    if (hour < 18) return 10 * 60 * 1000;
    return 5 * 60 * 1000;
}

async function getOddsSmart() {
    const CACHE_TIME = getCacheTime();
    const now = Date.now();

    const saved = localStorage.getItem("oddsData");
    const savedTime = localStorage.getItem("oddsTime");

    if (saved && savedTime && (now - savedTime < CACHE_TIME)) {
        console.log("💾 Cache local");
        return JSON.parse(saved);
    }

    console.log("🌐 Fetch odds");

    const data = await getRealOdds();

    localStorage.setItem("oddsData", JSON.stringify(data));
    localStorage.setItem("oddsTime", now);

    return data;
}
