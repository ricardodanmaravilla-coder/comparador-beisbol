<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB SHARP++ MODEL</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
header{padding:12px;text-align:center;background:#111827;font-weight:bold}
.container{padding:10px}
.card{background:#111827;margin-bottom:10px;padding:12px;border-radius:10px}
.good{color:#22c55e}
.bad{color:#ef4444}
.small{font-size:12px;opacity:.8}
hr{border:0;border-top:1px solid #333;margin:8px 0}
</style>

</head>

<body>

<header>⚾ SHARP++ MLB MODEL</header>

<div class="container" id="app">Cargando...</div>

<script>

const BANKROLL = 1000;
const PROXY = "https://corsproxy.io/?";
const API_KEY = "TU_API_KEY_AQUI";

// =====================
// DATA
// =====================
async function getGames(){
    const d = new Date().toISOString().split("T")[0];

    const res = await fetch(
        `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${d}&hydrate=probablePitcher,team`
    );

    const json = await res.json();
    return json?.dates?.[0]?.games || [];
}

// =====================
// ODDS
// =====================
async function getOdds(){
    try{
        const res = await fetch(`${PROXY}https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&markets=h2h&oddsFormat=decimal&apiKey=${API_KEY}`);
        return await res.json();
    }catch{
        return null;
    }
}

// =====================
// NORMALIZE
// =====================
const norm = s => (s||"").toLowerCase().replace(/[^a-z]/g,'');

// =====================
// SHARP COMPONENTS
// =====================

// estabilidad ofensiva
function offense(ops){
    return Math.max(0.68, Math.min(0.86, ops || 0.72));
}

// estabilidad pitching
function pitching(era){
    return Math.max(3.0, Math.min(5.8, era || 4.5));
}

// bullpen proxy (simplificado realista)
function bullpen(eraTeam){
    return Math.max(3.2, Math.min(5.2, eraTeam || 4.3));
}

// expected runs SHARP++
function expectedRuns(ops, era, bullpenAdj, home){

    let o = offense(ops);
    let p = pitching(era);

    let base = (o * 5.3) * (4.5 / p);

    // bullpen effect
    base *= (4.4 / bullpenAdj);

    if(home) base *= 1.06;

    return base;
}

// MONTE CARLO SIMULATION (light)
function simulateGame(r1, r2){

    let homeWins = 0;
    const sims = 2000;

    for(let i=0;i<sims;i++){
        const h = poisson(r1);
        const a = poisson(r2);

        if(h > a) homeWins++;
    }

    return homeWins / sims;
}

// poisson approximation (fast)
function poisson(mean){
    let L = Math.exp(-mean);
    let k = 0;
    let p = 1;

    do{
        k++;
        p *= Math.random();
    } while(p > L);

    return k - 1;
}

// EV
function EV(p, odds){
    return (p * odds) - 1;
}

// Kelly SHARP++
function kelly(p, odds){

    const b = odds - 1;
    const edge = (p * odds) - 1;

    if(edge < 0.025) return 0;

    let k = (b * p - (1 - p)) / b;

    // SHARP risk reduction
    k *= 0.28;

    // confidence scaling
    if(edge < 0.05) k *= 0.5;
    if(edge > 0.12) k *= 1.15;

    return Math.min(k, 0.02) * BANKROLL;
}

// =====================
// INIT
// =====================
async function init(){

    const app = document.getElementById("app");

    const games = await getGames();
    const odds = await getOdds();

    if(!games.length){
        app.innerHTML = "No games";
        return;
    }

    let html = "";

    games.forEach(g => {

        const home = g.teams.home.team.name;
        const away = g.teams.away.team.name;

        // REAL MLB (fallback safe)
        const homeOPS = 0.72;
        const awayOPS = 0.72;

        const homeERA = 4.5;
        const awayERA = 4.5;

        const homeBull = 4.3;
        const awayBull = 4.3;

        const rHome = expectedRuns(homeOPS, awayERA, awayBull, true);
        const rAway = expectedRuns(awayOPS, homeERA, homeBull, false);

        // Monte Carlo probability (SHARP++)
        const pHome = simulateGame(rHome, rAway);
        const pAway = 1 - pHome;

        let oddsH = 1.9;
        let oddsA = 2.0;

        if(odds){
            const match = odds.find(o =>
                norm(o.home_team) === norm(home) &&
                norm(o.away_team) === norm(away)
            );

            if(match?.bookmakers?.length){
                const m = match.bookmakers[0].markets;
                const h2h = m.find(x => x.key === "h2h");

                if(h2h){
                    oddsH = h2h.outcomes.find(x => norm(x.name) === norm(home))?.price || oddsH;
                    oddsA = h2h.outcomes.find(x => norm(x.name) === norm(away))?.price || oddsA;
                }
            }
        }

        const evH = EV(pHome, oddsH);
        const evA = EV(pAway, oddsA);

        let pick = "NO BET";
        let color = "bad";
        let p = 0;
        let o = 0;

        if(evH > evA && evH > 0.03){
            pick = home;
            color = "good";
            p = pHome;
            o = oddsH;
        }

        if(evA > evH && evA > 0.03){
            pick = away;
            color = "good";
            p = pAway;
            o = oddsA;
        }

        const stake = kelly(p, o);

        html += `
            <div class="card">
                <b>${away} @ ${home}</b>

                <div class="small">
                    Prob H ${(pHome*100).toFixed(1)}% | Prob A ${(pAway*100).toFixed(1)}%
                </div>

                <div class="small">
                    EV H ${(evH*100).toFixed(2)}% | EV A ${(evA*100).toFixed(2)}%
                </div>

                <hr>

                PICK: <span class="${color}">${pick}</span><br>
                STAKE: $${stake.toFixed(2)}
            </div>
        `;
    });

    app.innerHTML = html;
}

init();

</script>

</body>
</html>
