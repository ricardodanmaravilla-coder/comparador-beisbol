<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Smart Bets PRO</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
}

header{
    padding:14px;
    text-align:center;
    font-weight:bold;
    background:#111827;
}

.container{
    padding:10px;
}

.card{
    background:#111827;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
}

.badge{
    padding:4px 8px;
    border-radius:6px;
    font-size:11px;
}

.green{background:#16a34a;}
.red{background:#dc2626;}
.blue{background:#0284c7;}

.small{
    font-size:12px;
    opacity:0.8;
}
</style>

</head>

<body>

<header>⚾ MLB SMART BETS PRO</header>

<div class="container" id="app">Cargando...</div>

<script>

// =====================
// CONFIG
// =====================
const API_KEY = "TU_API_KEY_AQUI";
const PROXY = "https://corsproxy.io/?";
const BANKROLL = 1000;

// =====================
// CACHE ODDS
// =====================
let oddsCache = null;
let oddsTime = 0;
const CACHE_MS = 10 * 60 * 1000;

// =====================
// MLB GAMES
// =====================
async function getGames(){
    const today = new Date().toISOString().split("T")[0];

    const res = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=probablePitcher,team`);
    const data = await res.json();

    return data.dates?.[0]?.games || [];
}

// =====================
// ODDS API
// =====================
async function getOdds(){
    const now = Date.now();

    if(oddsCache && (now - oddsTime < CACHE_MS)){
        return oddsCache;
    }

    const url = `${PROXY}https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&markets=h2h,totals&oddsFormat=decimal&apiKey=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    oddsCache = data;
    oddsTime = now;

    return data;
}

// =====================
// FIND ODDS
// =====================
function norm(n){
    return (n||"").toLowerCase().replace(/[^a-z]/g,'');
}

function matchOdds(game, odds){
    if(!odds) return null;

    return odds.find(o =>
        norm(o.home_team) === norm(game.home) &&
        norm(o.away_team) === norm(game.away)
    );
}

// =====================
// MODEL
// =====================
function calcProb(home, away, homeRuns, awayRuns, homeERA, awayERA){

    let p = 0.5;

    // ofensiva
    if(homeRuns > awayRuns) p += 0.04;
    else p -= 0.04;

    // pitchers
    if(homeERA < awayERA) p += 0.06;
    if(homeERA > awayERA) p -= 0.06;

    // home field
    p += 0.03;

    return Math.min(Math.max(p,0.30),0.70);
}

// =====================
// EV
// =====================
function EV(prob, odds){
    return (prob * odds) - 1;
}

// =====================
// INIT
// =====================
async function init(){

    const app = document.getElementById("app");

    const games = await getGames();
    const odds = await getOdds();

    app.innerHTML = "";

    if(!games.length){
        app.innerHTML = "No games today";
        return;
    }

    games.forEach(g=>{

        const home = g.teams.home.team.name;
        const away = g.teams.away.team.name;

        const homePitcher = g.teams.home.probablePitcher?.fullName || "TBD";
        const awayPitcher = g.teams.away.probablePitcher?.fullName || "TBD";

        const homeERA = 4.5;
        const awayERA = 4.5;

        const homeRuns = 4.3;
        const awayRuns = 4.3;

        let pHome = calcProb(home,away,homeRuns,awayRuns,homeERA,awayERA);
        let pAway = 1 - pHome;

        const o = matchOdds({
            home, away
        }, odds);

        let oddsHome = 1.85;
        let oddsAway = 2.10;

        if(o && o.bookmakers?.length){

            const m = o.bookmakers[0].markets;

            const h2h = m.find(x=>x.key==="h2h");

            if(h2h){
                oddsHome = h2h.outcomes.find(x=>x.name===home)?.price || oddsHome;
                oddsAway = h2h.outcomes.find(x=>x.name===away)?.price || oddsAway;
            }
        }

        const evH = EV(pHome, oddsHome);
        const evA = EV(pAway, oddsAway);

        const bestEV = Math.max(evH, evA);

        let pick = "NO BET";
        let color = "red";

        if(bestEV > 0.15){
            pick = "💎 BEST BET";
            color = "green";
        } else if(bestEV > 0.05){
            pick = "🔥 VALUE";
            color = "blue";
        }

        const kelly = bestEV > 0 ? (bestEV / (Math.max(oddsHome,oddsAway)-1)) : 0;
        const stake = BANKROLL * (kelly * 0.5);

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div><b>${away} @ ${home}</b></div>

            <div class="small">
                🧢 ${awayPitcher} vs ${homePitcher}
            </div>

            <div class="small">
                Prob: ${(pHome*100).toFixed(1)}% - ${(pAway*100).toFixed(1)}%
            </div>

            <div style="margin-top:8px;">
                EV: <span class="badge ${color}">${(bestEV*100).toFixed(1)}%</span>
            </div>

            <div style="margin-top:8px;">
                PICK: <b>${pick}</b>
            </div>

            <div class="small">
                Stake sugerido: $${stake.toFixed(0)}
            </div>
        `;

        app.appendChild(div);
    });
}

init();

</script>

</body>
</html>
