<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHARP++ ELITE PRO MAX</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
header{padding:12px;text-align:center;background:#0f172a;font-weight:bold}
.container{padding:10px}
.card{background:#111827;margin-bottom:10px;padding:12px;border-radius:10px}
.good{color:#22c55e}
.bad{color:#ef4444}
.small{font-size:12px;opacity:.8}
hr{border:0;border-top:1px solid #333;margin:8px 0}
</style>
</head>

<body>

<header>⚾ SHARP++ ELITE PRO MAX</header>

<div class="container" id="app">Cargando...</div>

<script>

const BANKROLL = 1000;

// =====================
// HISTORIAL (LEARNING BASE)
// =====================
let bets = JSON.parse(localStorage.getItem("sharp_max") || "[]");

function save(){
    localStorage.setItem("sharp_max", JSON.stringify(bets));
}

// =====================
// MLB DATA
// =====================
async function getGames(){
    const d = new Date().toISOString().split("T")[0];

    const res = await fetch(
        `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${d}&hydrate=probablePitcher,team`
    );

    const json = await res.json();
    return json?.dates?.[0]?.games || [];
}

// =====================
// MODEL CORE
// =====================
function clamp(x,min,max){ return Math.max(min,Math.min(max,x)); }

function offense(ops){
    return clamp(ops || 0.72, 0.68, 0.86);
}

function pitching(era){
    return clamp(era || 4.5, 3.0, 6.0);
}

function bullpen(teamERA){
    return clamp(teamERA || 4.3, 3.2, 5.3);
}

function expectedRuns(ops, era, bull, home){

    let o = offense(ops);
    let p = pitching(era);

    let r = (o * 5.4) * (4.5 / p);

    r *= (4.4 / bull);

    if(home) r *= 1.06;

    return r;
}

// =====================
// MONTE CARLO
// =====================
function poisson(mean){
    let L = Math.exp(-mean);
    let k = 0;
    let p = 1;

    do {
        k++;
        p *= Math.random();
    } while(p > L);

    return k - 1;
}

function simulate(r1,r2){
    let h=0;
    const N=1800;

    for(let i=0;i<N;i++){
        if(poisson(r1)>poisson(r2)) h++;
    }

    return h/N;
}

// =====================
// MARKET EDGE
// =====================
function EV(p,o){ return (p*o)-1; }

// =====================
// KELLY PRO MAX
// =====================
function kelly(p,o,edge,clv){

    if(edge < 0.03) return 0;

    let b = o - 1;
    let k = (b*p - (1-p)) / b;

    // risk reduction base
    k *= 0.22;

    // CLV adjustment
    if(clv < 0) k *= 0.5;

    // performance adjustment
    const winrate = bets.length
        ? bets.filter(b=>b.r==="W").length/bets.length
        : 0.5;

    if(winrate < 0.48) k *= 0.7;
    if(winrate > 0.55) k *= 1.1;

    return Math.min(k,0.02) * BANKROLL;
}

// =====================
// CLV SIMULADO
// =====================
function clv(entry, close){
    return (1/entry)-(1/close);
}

// =====================
// MAIN
// =====================
async function run(){

    const app = document.getElementById("app");
    const games = await getGames();

    let html = "";

    games.forEach(g=>{

        const home=g.teams.home.team.name;
        const away=g.teams.away.team.name;

        const rHome=expectedRuns(0.72,4.5,4.3,true);
        const rAway=expectedRuns(0.72,4.5,4.3,false);

        const pHome=simulate(rHome,rAway);
        const pAway=1-pHome;

        const oddsH=1.90;
        const oddsA=2.00;

        const evH=EV(pHome,oddsH);
        const evA=EV(pAway,oddsA);

        const cHome=clv(oddsH,1.85);
        const cAway=clv(oddsA,1.95);

        let pick="NO BET";
        let p=0;
        let o=0;
        let edge=0;
        let clvv=0;

        if(evH>evA && evH>0.03){
            pick=home;
            p=pHome;
            o=oddsH;
            edge=evH;
            clvv=cHome;
        }

        if(evA>evH && evA>0.03){
            pick=away;
            p=pAway;
            o=oddsA;
            edge=evA;
            clvv=cAway;
        }

        const stake=kelly(p,o,edge,clvv);

        if(stake>0){
            bets.push({g:home+"-"+away,pick,r:o,st:stake,r:"OPEN",edge,clv:clvv});
            save();
        }

        html+=`
        <div class="card">
            <b>${away} @ ${home}</b><br><br>

            Prob H ${(pHome*100).toFixed(1)}% | Prob A ${(pAway*100).toFixed(1)}%<br>
            EV H ${(evH*100).toFixed(2)}% | EV A ${(evA*100).toFixed(2)}%<br>
            CLV H ${cHome.toFixed(3)} | CLV A ${cAway.toFixed(3)}<br><br>

            PICK: <b>${pick}</b><br>
            STAKE: $${stake.toFixed(2)}
        </div>`;
    });

    app.innerHTML=html;
}

run();

</script>

</body>
</html>
