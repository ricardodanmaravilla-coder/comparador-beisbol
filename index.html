
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Bets PRO</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0f1a;
    color:#fff;
}

header {
    background:#111827;
    padding:15px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}

#games {
    padding:10px;
}

.card {
    background:#111827;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.teams {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.team {
    width:48%;
}

.odds {
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.pick {
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
}

.value {
    background:#064e3b;
}

.no-value {
    background:#3f1d1d;
}
</style>

</head>

<body>

<header>📊 MLB BETS PRO</header>

<div id="games">Cargando juegos...</div>

<script>

// =========================
// ⚙️ CONFIG
// =========================

const API_KEY = "TU_API_KEY_AQUI"; // 👈 pon tu key
const PROXY = "https://corsproxy.io/?";

// =========================
// 📡 FETCH MLB
// =========================

async function getGames() {
    const today = new Date().toISOString().split("T")[0];

    const res = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}`);
    const data = await res.json();

    if (!data.dates.length) return [];

    return data.dates[0].games;
}

// =========================
// 💰 FETCH ODDS
// =========================

async function getRealOdds() {
    try {
        const url = `${PROXY}https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&markets=h2h,totals&oddsFormat=decimal&apiKey=${API_KEY}`;
        const res = await fetch(url);
        return await res.json();
    } catch(e){
        console.log("Error odds", e);
        return null;
    }
}

// =========================
// 🧠 CACHE INTELIGENTE
// =========================

function getCacheTime() {
    const hour = new Date().getHours();

    if (hour < 12) return 30 * 60 * 1000;
    if (hour < 18) return 10 * 60 * 1000;
    return 5 * 60 * 1000;
}

async function getOddsSmart() {
    const CACHE_TIME = getCacheTime();
    const now = Date.now();

    const saved = localStorage.getItem("oddsData");
    const savedTime = localStorage.getItem("oddsTime");

    if (saved && savedTime && (now - savedTime < CACHE_TIME)) {
        console.log("💾 Cache local");
        return JSON.parse(saved);
    }

    console.log("🌐 Fetch odds");

    const data = await getRealOdds();

    localStorage.setItem("oddsData", JSON.stringify(data));
    localStorage.setItem("oddsTime", now);

    return data;
}

// =========================
// 🔎 MATCH ODDS
// =========================

function normalize(name){
    return name.toLowerCase().replace(/[^a-z]/g,'');
}

function findOdds(game, oddsData){
    if (!oddsData) return null;

    return oddsData.find(o =>
        normalize(o.home_team) === normalize(game.home) &&
        normalize(o.away_team) === normalize(game.away)
    );
}

// =========================
// 🧮 EV
// =========================

function calcEV(prob, odds){
    return (prob * odds) - 1;
}

// =========================
// 🎯 INIT
// =========================

async function init(){

    const container = document.getElementById("games");

    const games = await getGames();

    if (games.length === 0) {
        container.innerHTML = "No hay juegos hoy";
        return;
    }

    const oddsData = await getOddsSmart();

    container.innerHTML = "";

    games.forEach(g => {

        const home = g.teams.home.team.name;
        const away = g.teams.away.team.name;

        // Probabilidad simple (puedes mejorar luego)
        let probHome = 0.55;
        let probAway = 0.45;

        const oddsAPI = findOdds({home, away}, oddsData);

        let oH = 1.8;
        let oA = 2.0;
        let total = 8.5;

        if (oddsAPI && oddsAPI.bookmakers.length > 0) {
            const markets = oddsAPI.bookmakers[0].markets;

            const h2h = markets.find(m => m.key === "h2h");
            const totals = markets.find(m => m.key === "totals");

            if (h2h) {
                oH = h2h.outcomes.find(o => o.name === home)?.price || oH;
                oA = h2h.outcomes.find(o => o.name === away)?.price || oA;
            }

            if (totals) {
                total = totals.outcomes[0]?.point || total;
            }
        }

        const evHome = calcEV(probHome, oH);
        const evAway = calcEV(probAway, oA);

        let pick = "No bet";
        let pickClass = "no-value";

        if (evHome > 0) {
            pick = `🔥 VALUE: ${home}`;
            pickClass = "value";
        }

        if (evAway > evHome && evAway > 0) {
            pick = `🔥 VALUE: ${away}`;
            pickClass = "value";
        }

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="teams">
                <div class="team">${away}</div>
                <div class="team" style="text-align:right">${home}</div>
            </div>

            <div class="odds">
                <div>${oA.toFixed(2)}</div>
                <div>${oH.toFixed(2)}</div>
            </div>

            <div class="pick ${pickClass}">
                ${pick} <br>
                EV H: ${evHome.toFixed(2)} | EV A: ${evAway.toFixed(2)}
            </div>
        `;

        container.appendChild(card);

    });
}

init();

</script>

</body>
</html>
