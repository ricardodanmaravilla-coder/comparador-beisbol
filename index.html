            let equiposMLB = [];

                const data = await res.json();

        async function obtenerEstadisticas(valorSeleccionado) {

                        fetch(`https://statsapi.mlb.com/api/v1/teams/${teamId}/stats?stats=season&group=pitching`)
                    ]);

                    const dataPitcheo = await resPitcheo.json();
                    const statsBateo = dataBateo.stats[0]?.splits[0]?.stat || {};
                    const statsPitcheo = dataPitcheo.stats[0]?.splits[0]?.stat || {};

                    if (!statsBateo.avg && !statsPitcheo.era) throw new Error();

                    return {
                        bateo: parseFloat(statsBateo.avg || 0),
                        ops: parseFloat(statsBateo.ops || 0),
                        hr: parseInt(statsBateo.homeRuns || 0),

                        "117": { bateo: 0.262, ops: 0.765, hr: 215, era: 3.85, whip: 1.25 },

        async function compararEquipos() {
            const select1 = document.getElementById("equipo1");
            const select2 = document.getElementById("equipo2");
            const horario = document.getElementById("horarioJuego").value;
            
            const e1 = select1.value; const e2 = select2.value;
            const nombreE1 = select1.options[select1.selectedIndex].text;
            const nombreE2 = select2.options[select2.selectedIndex].text;
            
            const boton = document.getElementById("btnComparar");
            boton.innerText = "Calculando Coeficientes...";
            boton.disabled = true;

            try {
                const [datosE1, datosE2] = await Promise.all([
                    obtenerEstadisticas(e1), obtenerEstadisticas(e2)
                ]);

                document.getElementById("bateoE1").innerText = datosE1.bateo.toFixed(3);
                document.getElementById("bateoE2").innerText = datosE2.bateo.toFixed(3);
                document.getElementById("opsE1").innerText = datosE1.ops.toFixed(3);
                document.getElementById("opsE2").innerText = datosE2.ops.toFixed(3);
                document.getElementById("hrE1").innerText = datosE1.hr;
                document.getElementById("hrE2").innerText = datosE2.hr;
                document.getElementById("eraE1").innerText = datosE1.era.toFixed(2);
                document.getElementById("eraE2").innerText = datosE2.era.toFixed(2);
                document.getElementById("whipE1").innerText = datosE1.whip.toFixed(2);
                document.getElementById("whipE2").innerText = datosE2.whip.toFixed(2);
                
                aplicarColores("bateoE1", "bateoE2", datosE1.bateo > datosE2.bateo);
                aplicarColores("opsE1", "opsE2", datosE1.ops > datosE2.ops);
                aplicarColores("hrE1", "hrE2", datosE1.hr > datosE2.hr);
                aplicarColores("eraE1", "eraE2", datosE1.era < datosE2.era);
                aplicarColores("whipE1", "whipE2", datosE1.whip < datosE2.whip);

                // --- ALGORITMO INTEGRADO DÍA/NOCHE ---
                let puntosE1 = 0; let puntosE2 = 0;

                if (datosE1.bateo > datosE2.bateo) puntosE1++; else puntosE2++;
                if (datosE1.hr > datosE2.hr) puntosE1++; else puntosE2++;
                if (datosE1.era < datosE2.era) puntosE1++; else puntosE2++;

                // Asignación de pesos dinámicos sabermétricos
                if (horario === "dia") {
                    // El Sol/Calor premia aún más al equipo con mayor poder destructivo (OPS)
                    puntosE1 += (datosE1.ops > datosE2.ops) ? 2.0 : 0;
                    puntosE2 += (datosE2.ops > datosE1.ops) ? 2.0 : 0;
                    puntosE1 += (datosE1.whip < datosE2.whip) ? 1.0 : 0;
                    puntosE2 += (datosE2.whip < datosE1.whip) ? 1.0 : 0;
                } else {
                    // La Noche/Humedad premia fuertemente al equipo con lanzadores que controlan la zona (WHIP)
                    puntosE1 += (datosE1.ops > datosE2.ops) ? 1.0 : 0;
                    puntosE2 += (datosE2.ops > datosE1.ops) ? 1.0 : 0;
                    puntosE1 += (datosE1.whip < datosE2.whip) ? 2.0 : 0;
                    puntosE2 += (datosE2.whip < datosE1.whip) ? 2.0 : 0;
                }

                let ganadorPredicho = "";
                if (puntosE1 > puntosE2) ganadorPredicho = nombreE1;
                else if (puntosE2 > puntosE1) ganadorPredicho = nombreE2;
                else ganadorPredicho = (datosE1.whip < datosE2.whip) ? nombreE1 : nombreE2;

                // --- AJUSTE MATEMÁTICO DE CARRERAS SEGÚN DENSIDAD DEL AIRE ---
                const sumaOPS = datosE1.ops + datosE2.ops;
                const sumaWHIP = datosE1.whip + datosE2.whip;
                let carrerasBase = (sumaOPS * 4) + (sumaWHIP * 1.3);

                if (horario === "dia") {
                    carrerasBase = carrerasBase * 1.09; // Aumento del 9% en promedio por la física de la tarde
                } else {
                    carrerasBase = carrerasBase * 0.92; // Reducción del 8% por resistencia del aire nocturno
                }

                let carrerasEstimadas = Math.round(carrerasBase);
                if (carrerasEstimadas < 4) carrerasEstimadas = 4;
                if (carrerasEstimadas > 16) carrerasEstimadas = 15;

                document.getElementById("txtGanador").innerText = "🏆 " + ganadorPredicho;
                document.getElementById("txtCarreras").innerText = carrerasEstimadas + " Carreras en Total";
                document.getElementById("panelPrediccion").style.display = "block";

            } catch (error) {
                alert("Error al procesar el simulador.");
                console.error(error);
            } finally {
                boton.innerText = "Simular Partido";
                boton.disabled = false;
            }
        }

        function aplicarColores(id1, id2, condicionGanaE1) {
            const el1 = document.getElementById(id1); const el2 = document.getElementById(id2);
            if (condicionGanaE1) { el1.className = "col-equipo ganador"; el2.className = "col-equipo perdedor"; } 
            else { el1.className = "col-equipo perdedor"; el2.className = "col-equipo ganador"; }
        }
    </script>
</body>
</html>
